<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loyverse OAuth Callback</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="callback-shell">
      <section class="callback-panel">
        <span class="brand-mark">Q</span>
        <h1>Loyverse 授权回调已到达</h1>
        <p>
          这是临时占位页面。正式开发时，这个地址会由后端接收
          <code>code</code>，再换取 Loyverse access token。
        </p>
        <dl id="params"></dl>
        <a class="primary-button" href="/">返回首页</a>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const list = document.getElementById("params");

      if ([...params.keys()].length === 0) {
        list.innerHTML = "<dt>Status</dt><dd>No query parameters received.</dd>";
      } else {
        list.innerHTML = [...params.entries()]
          .map(([key, value]) => `<dt>${key}</dt><dd>${value}</dd>`)
          .join("");
      }
    </script>
  </body>
</html>
